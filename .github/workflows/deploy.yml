name: Deploy Snowflake Objects

on:
  push:
    branches:
      - main
    paths:
      - 'DWH/**/*.ipynb'
      - 'DWH/Notebookprojectrecreation.sql'
      - 'DWH/taskorchestration.sql'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect Changed Files
        id: changes
        uses: tj-actions/changed-files@v45
        with:
          files: |
            DWH/**/*.ipynb
            DWH/Notebookprojectrecreation.sql
            DWH/taskorchestration.sql

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Snowflake CLI
        run: |
          python -m pip install --upgrade pip
          pip install snowflake-cli

      - name: Verify Snowflake CLI
        run: |
          snow --version

      - name: Configure Snowflake Connection
        run: |
          mkdir -p ~/.snowflake

          cat > ~/.snowflake/config.toml <<EOF
          default_connection_name = "default"

          [connections.default]
          account = "${{ secrets.SNOWFLAKE_ACCOUNT }}"
          user = "${{ secrets.SNOWFLAKE_USER }}"
          password = "${{ secrets.SNOWFLAKE_PASSWORD }}"
          warehouse = "${{ secrets.SNOWFLAKE_WAREHOUSE }}"
          role = "${{ secrets.SNOWFLAKE_ROLE }}"
          EOF

          chmod 600 ~/.snowflake/config.toml

      - name: Test Snowflake Connection
        run: |
          snow sql -q "SELECT CURRENT_VERSION();"

      - name: Recreate Notebook Project
        if: |
          contains(steps.changes.outputs.all_changed_files, 'DWH/Notebookprojectrecreation.sql') ||
          contains(steps.changes.outputs.all_changed_files, '.ipynb')
        run: |
          echo "Notebook changes detected..."
          snow sql -f DWH/Notebookprojectrecreation.sql

      - name: Deploy Task Orchestration
        if: contains(steps.changes.outputs.all_changed_files, 'DWH/taskorchestration.sql')
        run: |
          echo "Task changes detected..."
          snow sql -f DWH/taskorchestration.sql
